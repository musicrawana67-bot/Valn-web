<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Napking Villain</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Bebas+Neue&family=Noto+Sans+Sinhala:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

<div class="bg-fx">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="wrap">

  <header>

    <div class="logo-ring">
      <div class="logo-placeholder">
        NV
        <small>VILLAIN</small>
      </div>
    </div>

    <h1 class="brand">
      NAPKING VILLAIN
      <span class="brand-si">නැප්කින්ග් විලන්</span>
    </h1>

    <div class="team-badge">
      <div class="dot"></div>
      TEAM DANJER KILER
    </div>

  </header>

  <div class="divider">
    <span class="divider-icon">⚡</span>
  </div>

  <section class="upload-section">

    <h2 class="section-title">UPLOAD PHOTO</h2>

    <div class="upload-card">

      <div class="drop-zone" id="dropZone">
        <input type="file" id="imageInput" accept="image/*">

        <div class="dz-icon">📸</div>
        <div class="dz-text">
          CLICK OR DROP IMAGE
        </div>

        <img id="previewImage" class="preview-img" style="display:none;">
      </div>

      <div class="caption-area">

        <label>USERNAME</label>
        <input type="text" id="username" class="name-input" placeholder="ENTER NAME">

        <label>DISS</label>
        <textarea id="captionText" placeholder="WRITE YOUR DISS..."></textarea>

        <button class="post-btn" id="postBtn">
          POST NOW
        </button>

      </div>

    </div>

  </section>

  <section class="feed">

    <h2 class="section-title">POSTS</h2>

    <div class="posts-grid" id="postsGrid">

      <div class="empty-state">
        NO POSTS YET
      </div>

    </div>

  </section>

</div>

<script src="script.js"></script>

</body>
</html>
